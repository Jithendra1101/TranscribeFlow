{% extends 'base.html' %}
{% block content %}
<div class="container">
  <div class="form-box">
    <h2>Sign Up</h2>
    <p class="subtitle">Create your TranscribeFlow account</p>
    <form method="post">
      <input name="username" placeholder="Username" required class="input-field"><br>
      <input name="email" type="email" placeholder="Email" required class="input-field"><br>
      <input name="password" type="password" placeholder="Password" required class="input-field"><br>
      <button type="submit" class="btn"><span style="vertical-align:middle;">&#128100;</span> Sign Up</button>
    </form>
    <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<ul class="msg">{% for m in messages %}<li>{{ m }}</li>{% endfor %}</ul>{% endif %}
    {% endwith %}
  </div>
</div>
{% endblock %}
