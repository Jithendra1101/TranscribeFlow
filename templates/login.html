{% extends 'base.html' %}
{% block content %}
<div class="container">
  <div class="form-box">
    <h2>Login</h2>
    <p class="subtitle">Sign in to TranscribeFlow</p>
    <form method="post">
      <input name="username" placeholder="Username or Email" required class="input-field"><br>
      <input name="password" type="password" placeholder="Password" required class="input-field"><br>
      <button type="submit" class="btn"><span style="vertical-align:middle;">&#128274;</span> Login</button>
    </form>
    <p>Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<ul class="msg">{% for m in messages %}<li>{{ m }}</li>{% endfor %}</ul>{% endif %}
    {% endwith %}
  </div>
</div>
{% endblock %}
